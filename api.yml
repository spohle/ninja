# api.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: render-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api # Matches the template label below
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: ninja-api-sa # THIS IS THE CRITICAL FIX
      containers:
      - name: api
        image: render-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        command: ["python", "-m", "uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8000"]
        volumeMounts:
        - mountPath: /render_data 
          name: shared-storage
      volumes:
      - name: shared-storage
        persistentVolumeClaim:
          claimName: render-data-pvc # Ensure this matches your storage.yml
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  type: LoadBalancer 
  selector:
    app: api
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000